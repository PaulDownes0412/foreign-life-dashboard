<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Value Builder Assessment | Business Doctors UK</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1a2744;
    --navy-light: #243560;
    --orange: #e8813a;
    --orange-light: #f0a060;
    --green: #27ae60;
    --amber: #f39c12;
    --red: #c0392b;
    --grey-bg: #f4f6fa;
    --grey-border: #dde2ec;
    --grey-text: #6b7280;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(26,39,68,0.10);
  }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--grey-bg); color: #1a2744; min-height: 100vh; }

  /* TOP BAR */
  .topbar { background: var(--navy); color: var(--white); padding: 14px 32px; display: flex; align-items: center; gap: 16px; }
  .topbar .logo { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.5px; }
  .topbar .logo span { color: var(--orange); }
  .topbar .subtitle { font-size: 0.85rem; color: #a0aec0; margin-left: auto; }

  /* PROGRESS BAR */
  .progress-wrap { background: var(--white); border-bottom: 1px solid var(--grey-border); padding: 0 32px; }
  .progress-steps { display: flex; gap: 0; overflow-x: auto; }
  .step-pill { flex: 1; min-width: 80px; text-align: center; padding: 10px 4px 8px; font-size: 0.7rem; color: #a0aec0; border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
  .step-pill.active { color: var(--orange); border-bottom-color: var(--orange); font-weight: 600; }
  .step-pill.done { color: var(--green); border-bottom-color: var(--green); }
  .step-pill.locked { opacity: 0.35; cursor: default; }
  .step-pill .step-num { display: block; font-size: 0.85rem; font-weight: 700; }

  /* MAIN CONTAINER */
  .main { max-width: 820px; margin: 32px auto; padding: 0 16px 60px; }
  .card { background: var(--white); border-radius: 12px; box-shadow: var(--shadow); padding: 36px 40px; margin-bottom: 24px; }

  /* WELCOME */
  .welcome-hero { text-align: center; padding: 8px 0 24px; }
  .welcome-hero h1 { font-size: 2rem; color: var(--navy); margin-bottom: 8px; }
  .welcome-hero p { color: var(--grey-text); font-size: 1.05rem; max-width: 600px; margin: 0 auto; }
  .welcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 8px; }
  .driver-preview { background: var(--grey-bg); border-radius: 8px; padding: 12px 16px; font-size: 0.875rem; }
  .driver-preview strong { color: var(--navy); display: block; margin-bottom: 2px; }

  /* FORM FIELDS */
  label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  input[type=text], input[type=number], select, textarea {
    width: 100%; padding: 10px 14px; border: 1px solid var(--grey-border); border-radius: 8px;
    font-size: 0.95rem; color: var(--navy); background: var(--white); transition: border 0.2s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 3px rgba(232,129,58,0.12); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { margin-bottom: 18px; }
  .form-hint { font-size: 0.78rem; color: var(--grey-text); margin-top: 4px; }

  /* DRIVER SECTION */
  .driver-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 28px; }
  .driver-badge { background: var(--navy); color: var(--white); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; flex-shrink: 0; }
  .driver-title h2 { font-size: 1.4rem; color: var(--navy); }
  .driver-title p { color: var(--grey-text); font-size: 0.92rem; margin-top: 4px; }

  /* RADIO QUESTIONS */
  .question-block { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--grey-border); }
  .question-block:last-child { border-bottom: none; }
  .question-text { font-size: 1rem; font-weight: 600; color: var(--navy); margin-bottom: 14px; line-height: 1.5; }
  .question-num { color: var(--orange); font-size: 0.85rem; font-weight: 700; margin-bottom: 4px; }
  .radio-group { display: flex; flex-direction: column; gap: 10px; }
  .radio-option { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; border: 1.5px solid var(--grey-border); border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .radio-option:hover { border-color: var(--orange-light); background: #fff8f3; }
  .radio-option.selected { border-color: var(--orange); background: #fff5ee; }
  .radio-option input[type=radio] { margin-top: 2px; accent-color: var(--orange); flex-shrink: 0; }
  .radio-option-label { font-size: 0.9rem; color: #374151; line-height: 1.4; }
  .radio-option.selected .radio-option-label { color: var(--navy); font-weight: 500; }

  /* FINANCIAL PROFORMA */
  .section-title { font-size: 1.1rem; font-weight: 700; color: var(--navy); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--orange); }
  .fin-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .fin-row label { flex: 1; margin: 0; font-size: 0.875rem; font-weight: 500; }
  .fin-row .fin-input { width: 180px; flex-shrink: 0; }
  .fin-row .fin-sign { width: 24px; text-align: center; font-weight: 700; color: var(--orange); flex-shrink: 0; }
  .fin-total { background: var(--navy); color: var(--white); border-radius: 8px; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-top: 8px; }
  .fin-subtotal { background: var(--grey-bg); border-radius: 6px; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; color: var(--navy); margin: 8px 0; }
  .addback-item { background: #f0faf4; border: 1px solid #b7e4c7; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
  .addback-item label { color: #1a6b3a; }
  .addback-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* NAVIGATION BUTTONS */
  .nav-buttons { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; }
  .btn { padding: 12px 28px; border-radius: 8px; font-size: 0.95rem; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--orange); color: var(--white); }
  .btn-primary:hover { background: #d4702a; }
  .btn-secondary { background: var(--white); color: var(--navy); border: 1.5px solid var(--grey-border); }
  .btn-secondary:hover { border-color: var(--navy); }
  .btn-large { padding: 14px 36px; font-size: 1rem; }
  .btn-print { background: var(--navy); color: var(--white); }
  .btn-print:hover { background: var(--navy-light); }
  .required-note { font-size: 0.78rem; color: var(--grey-text); }
  .error-msg { color: var(--red); font-size: 0.82rem; margin-top: 6px; display: none; }
  .error-msg.show { display: block; }

  /* REPORT */
  .report-header { background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%); color: var(--white); border-radius: 12px; padding: 32px 40px; margin-bottom: 24px; }
  .report-header h1 { font-size: 1.8rem; margin-bottom: 4px; }
  .report-header .company-name { color: var(--orange-light); font-size: 1.1rem; margin-bottom: 16px; }
  .report-meta { display: flex; gap: 32px; flex-wrap: wrap; }
  .report-meta-item { font-size: 0.85rem; color: #a0aec0; }
  .report-meta-item span { color: var(--white); font-weight: 600; display: block; }

  .overall-score-card { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
  .overall-gauge-wrap { flex: 0 0 260px; }
  .overall-score-details { flex: 1; min-width: 200px; }
  .score-big { font-size: 4rem; font-weight: 800; color: var(--navy); line-height: 1; }
  .score-label { color: var(--grey-text); font-size: 0.9rem; margin-top: 4px; }
  .score-band { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; margin-top: 12px; }
  .band-red { background: #fde8e8; color: var(--red); }
  .band-amber { background: #fef3cd; color: #92600a; }
  .band-green { background: #d4edda; color: #1a6b3a; }

  .drivers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-bottom: 24px; }
  .driver-score-card { background: var(--white); border-radius: 10px; box-shadow: var(--shadow); padding: 20px; }
  .driver-score-card h3 { font-size: 0.95rem; color: var(--navy); margin-bottom: 12px; }
  .driver-gauge-wrap { height: 140px; position: relative; }
  .driver-score-num { text-align: center; font-size: 1.4rem; font-weight: 700; color: var(--navy); margin-top: -8px; }
  .driver-avg-label { text-align: center; font-size: 0.75rem; color: var(--grey-text); }

  .score-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .score-table th { background: var(--navy); color: var(--white); padding: 10px 14px; text-align: left; font-weight: 600; }
  .score-table td { padding: 10px 14px; border-bottom: 1px solid var(--grey-border); vertical-align: middle; }
  .score-table tr:nth-child(even) td { background: var(--grey-bg); }
  .score-bar-wrap { width: 120px; height: 8px; background: #e5e7eb; border-radius: 4px; display: inline-block; vertical-align: middle; }
  .score-bar { height: 8px; border-radius: 4px; }
  .score-vs { font-size: 0.78rem; color: var(--grey-text); }
  .tag-above { color: var(--green); font-weight: 600; }
  .tag-below { color: var(--red); font-weight: 600; }

  .valuation-card { background: linear-gradient(135deg, #1a4a2a, #27ae60); color: var(--white); border-radius: 12px; padding: 28px 36px; }
  .valuation-card h2 { font-size: 1.3rem; margin-bottom: 20px; opacity: 0.9; }
  .valuation-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
  .val-item { background: rgba(255,255,255,0.12); border-radius: 8px; padding: 14px; }
  .val-item .val-label { font-size: 0.75rem; opacity: 0.8; margin-bottom: 4px; }
  .val-item .val-num { font-size: 1.6rem; font-weight: 800; }
  .val-item .val-sub { font-size: 0.75rem; opacity: 0.7; }

  .recommendations { margin-top: 4px; }
  .rec-item { border-left: 4px solid var(--orange); padding: 12px 16px; margin-bottom: 12px; background: #fff8f3; border-radius: 0 8px 8px 0; }
  .rec-item .rec-driver { font-weight: 700; color: var(--navy); font-size: 0.85rem; }
  .rec-item .rec-text { font-size: 0.875rem; color: #374151; margin-top: 4px; line-height: 1.5; }

  @media print {
    .topbar, .progress-wrap, .nav-buttons, .btn-print, .btn-secondary { display: none !important; }
    .main { margin: 0; padding: 0; max-width: 100%; }
    .card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
    .drivers-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .card { padding: 20px; }
    .form-grid, .welcome-grid, .addback-row { grid-template-columns: 1fr; }
    .overall-score-card { flex-direction: column; }
    .fin-row { flex-direction: column; align-items: flex-start; }
    .fin-row .fin-input { width: 100%; }
  }

  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* SAVE/LOAD BAR */
  .savebar { background: var(--navy-light); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 6px 32px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .savebar .save-label { font-size: 0.78rem; color: #a0aec0; }
  .savebar .save-status { font-size: 0.78rem; color: #6ee7b7; }
  .btn-save { padding: 5px 14px; border-radius: 6px; font-size: 0.78rem; font-weight: 600; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: #e2e8f0; cursor: pointer; transition: all 0.15s; }
  .btn-save:hover { background: rgba(255,255,255,0.16); }
  .btn-save.danger { border-color: rgba(239,68,68,0.4); color: #fca5a5; }
  .btn-save.danger:hover { background: rgba(239,68,68,0.15); }
  .restore-banner { background: #fffbeb; border: 1.5px solid #f59e0b; border-radius: 10px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .restore-banner .rb-icon { font-size: 1.5rem; }
  .restore-banner .rb-text { flex: 1; font-size: 0.9rem; color: #92600a; }
  .restore-banner .rb-text strong { display: block; color: #78350f; margin-bottom: 2px; }
  .restore-banner .rb-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  @media print { .savebar { display: none !important; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Business <span>Doctors</span> UK</div>
  <div class="subtitle">Value Builder Assessment Tool</div>
</div>

<div class="savebar">
  <span class="save-label">Progress:</span>
  <span class="save-status" id="saveStatus">Not saved yet</span>
  <button class="btn-save" onclick="exportToFile()" title="Download your answers as a JSON file you can reload later">&#8659; Save to File</button>
  <label class="btn-save" style="cursor:pointer" title="Load previously saved answers from a JSON file">
    &#8657; Load from File
    <input type="file" accept=".json" onchange="importFromFile(event)" style="display:none">
  </label>
  <button class="btn-save danger" onclick="clearSaved()" title="Clear all saved data and start fresh">&#10005; Clear Saved Data</button>
</div>

<div class="progress-wrap">
  <div class="progress-steps" id="progressSteps"></div>
</div>

<div class="main" id="mainContent"></div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────

const INDUSTRY_AVERAGES = {
  overall: 57,
  financial: 48,
  growth: 65,
  switzerland: 67,
  teeter: 50,
  recurring: 35,
  monopoly: 52,
  customer: 77,
  hub: 60
};

// Multiple range [min, max] per industry sector
const INDUSTRY_MULTIPLES = {
  'Technology / Software / SaaS':           { min: 4.0, max: 10.0 },
  'Professional Services (Consulting/Legal/Accountancy)': { min: 3.0, max: 7.0 },
  'Healthcare / Medical / Dental':          { min: 3.0, max: 8.0 },
  'Financial Services':                     { min: 3.0, max: 7.0 },
  'Manufacturing':                          { min: 2.5, max: 5.5 },
  'Construction / Engineering':             { min: 2.0, max: 5.0 },
  'Wholesale / Distribution':               { min: 2.0, max: 4.5 },
  'Retail / E-commerce':                    { min: 1.5, max: 4.0 },
  'Food & Beverage / Hospitality':          { min: 2.0, max: 5.0 },
  'Media / Marketing / PR':                 { min: 2.5, max: 6.0 },
  'Education / Training':                   { min: 2.5, max: 6.0 },
  'Recruitment / HR Services':              { min: 3.0, max: 6.0 },
  'Logistics / Transport':                  { min: 2.0, max: 4.5 },
  'Property / Real Estate Services':        { min: 2.5, max: 5.0 },
  'Other / Mixed':                          { min: 2.0, max: 5.0 }
};

const SCORE_BANDS = [
  { min: 0,  max: 40, label: 'Needs Work',       cls: 'band-red'   },
  { min: 40, max: 70, label: 'Building Value',    cls: 'band-amber' },
  { min: 70, max: 101,label: 'Value Builder',     cls: 'band-green' }
];

// ─── DRIVER DEFINITIONS ──────────────────────────────────────────────────────

const DRIVERS = [
  {
    id: 'financial', num: 1,
    name: 'Financial Performance',
    avgKey: 'financial',
    description: 'A buyer will scrutinise your historical financial results. Strong, consistent growth and healthy margins signal a low-risk business worth paying a premium for.',
    improvements: [
      'Focus on reducing operating costs and improving profit margins',
      'Establish clear monthly management accounts to track profitability by product/service line',
      'Benchmark your financial performance against industry peers to identify improvement levers',
      'Build a 3-year forward-looking financial model to demonstrate future potential'
    ],
    questions: [
      {
        id: 'fin1',
        text: 'How would you describe your company\'s revenue trend over the last 3 years?',
        options: [
          { label: 'Declining significantly year-on-year', score: 0 },
          { label: 'Flat or declining slightly', score: 25 },
          { label: 'Growing moderately (5–10% p.a.)', score: 50 },
          { label: 'Growing strongly (10–25% p.a.)', score: 75 },
          { label: 'Growing exceptionally (>25% p.a.)', score: 100 }
        ]
      },
      {
        id: 'fin2',
        text: 'What is your approximate EBITDA margin (earnings before interest, tax, depreciation and amortisation as a % of revenue)?',
        options: [
          { label: 'Less than 5%', score: 0 },
          { label: '5–10%', score: 25 },
          { label: '10–15%', score: 50 },
          { label: '15–25%', score: 75 },
          { label: 'Greater than 25%', score: 100 }
        ]
      },
      {
        id: 'fin3',
        text: 'How consistent and predictable is your revenue year-over-year?',
        options: [
          { label: 'Very inconsistent — large swings each year', score: 0 },
          { label: 'Somewhat variable', score: 25 },
          { label: 'Mostly consistent with occasional variation', score: 50 },
          { label: 'Very consistent and largely predictable', score: 75 },
          { label: 'Highly predictable — we can forecast accurately 12+ months ahead', score: 100 }
        ]
      },
      {
        id: 'fin4',
        text: 'How does your profitability compare to your industry peers?',
        options: [
          { label: 'Significantly below industry average', score: 0 },
          { label: 'Slightly below average', score: 25 },
          { label: 'In line with industry average', score: 50 },
          { label: 'Above average', score: 75 },
          { label: 'Top quartile in our sector', score: 100 }
        ]
      },
      {
        id: 'fin5',
        text: 'How robust is the free cash flow generated by the business (after capital expenditure)?',
        options: [
          { label: 'Negative — the business consumes cash', score: 0 },
          { label: 'Roughly break-even', score: 25 },
          { label: 'Modest positive cash generation', score: 50 },
          { label: 'Strong positive cash flow', score: 75 },
          { label: 'Exceptional cash generation relative to profit', score: 100 }
        ]
      }
    ]
  },
  {
    id: 'growth', num: 2,
    name: 'Growth Potential',
    avgKey: 'growth',
    description: 'Buyers pay for future earnings, not just past performance. A credible growth story backed by a large addressable market commands a higher valuation.',
    improvements: [
      'Map your total addressable market to identify growth opportunities',
      'Create a written growth strategy with specific milestones and KPIs',
      'Identify and dedicate resources to 2-3 key growth initiatives',
      'Strengthen your sales and marketing infrastructure to support expansion'
    ],
    questions: [
      {
        id: 'gro1',
        text: 'How scalable is your business model — can revenue grow significantly without a proportional increase in costs?',
        options: [
          { label: 'Not at all scalable — costs grow in line with revenue', score: 0 },
          { label: 'Slightly scalable', score: 25 },
          { label: 'Moderately scalable', score: 50 },
          { label: 'Highly scalable', score: 75 },
          { label: 'Extremely scalable — near-zero marginal cost of growth', score: 100 }
        ]
      },
      {
        id: 'gro2',
        text: 'What is the size of your total addressable market (TAM)?',
        options: [
          { label: 'Very small or highly niche — limited headroom', score: 0 },
          { label: 'Limited — we already have significant market share', score: 25 },
          { label: 'Moderate — meaningful room to grow', score: 50 },
          { label: 'Large — we serve only a small fraction of potential customers', score: 75 },
          { label: 'Huge / global — substantial untapped opportunity', score: 100 }
        ]
      },
      {
        id: 'gro3',
        text: 'Do you have a documented, actionable growth strategy?',
        options: [
          { label: 'No growth plan exists', score: 0 },
          { label: 'Informal ideas — nothing written down', score: 25 },
          { label: 'Basic written plan with broad goals', score: 50 },
          { label: 'Detailed strategy with milestones and owners', score: 75 },
          { label: 'Fully documented growth playbook with KPIs and budget', score: 100 }
        ]
      },
      {
        id: 'gro4',
        text: 'Have you successfully launched new products, services, or entered new markets in the last 2 years?',
        options: [
          { label: 'No — we offer the same things as 3+ years ago', score: 0 },
          { label: 'Considering it but nothing launched yet', score: 25 },
          { label: 'One attempt with mixed results', score: 50 },
          { label: 'Successfully launched one new product/market', score: 75 },
          { label: 'Multiple successful launches — innovation is a strength', score: 100 }
        ]
      },
      {
        id: 'gro5',
        text: 'How strong is your sales and marketing infrastructure to support growth?',
        options: [
          { label: 'No dedicated sales or marketing function', score: 0 },
          { label: 'Ad hoc marketing with no clear process', score: 25 },
          { label: 'Basic sales process and occasional marketing', score: 50 },
          { label: 'Dedicated team with clear pipeline and CRM', score: 75 },
          { label: 'Sophisticated, data-driven sales and marketing engine', score: 100 }
        ]
      }
    ]
  },
  {
    id: 'switzerland', num: 3,
    name: 'Switzerland Structure',
    avgKey: 'switzerland',
    description: 'Like Switzerland, your business should be independent and neutral — not over-reliant on any single customer, supplier, or employee. Concentration risk reduces value.',
    improvements: [
      'Actively reduce reliance on your top customer by diversifying your client base',
      'Diversify your supplier base to avoid dependency on single providers',
      'Cross-train staff to remove single-employee dependency risks',
      'Set targets to keep no customer above 15-20% of revenue'
    ],
    questions: [
      {
        id: 'swi1',
        text: 'What percentage of total revenue comes from your single largest customer?',
        options: [
          { label: 'More than 30%', score: 0 },
          { label: '20–30%', score: 25 },
          { label: '10–20%', score: 50 },
          { label: '5–10%', score: 75 },
          { label: 'Less than 5%', score: 100 }
        ]
      },
      {
        id: 'swi2',
        text: 'How dependent is the business on a single key supplier or vendor?',
        options: [
          { label: 'One supplier controls >50% of our supply chain', score: 0 },
          { label: 'Significant dependency on one supplier (30–50%)', score: 25 },
          { label: 'Some dependency but alternatives exist', score: 50 },
          { label: 'Multiple suppliers — no single point of failure', score: 75 },
          { label: 'Fully diversified supply chain with no key dependency', score: 100 }
        ]
      },
      {
        id: 'swi3',
        text: 'How dependent is the business on one key employee (other than the owner)?',
        options: [

// ─── WIZARD STATE ─────────────────────────────────────────────────────────────

const state = {
  step: 0,
  company: {},
  answers: {},
  financials: {},
  industry: '',
  scores: {}
};

// step 0 = welcome/company, 1-8 = drivers, 9 = financials, 10 = report
const TOTAL_STEPS = 11;

function stepName(i) {
  if (i === 0) return 'Company';
  if (i >= 1 && i <= 8) return DRIVERS[i-1].name.replace('The Valuation Teeter-Totter','Teeter-Totter').replace('Switzerland Structure','Switzerland').replace('Monopoly Control','Monopoly').replace('Customer Satisfaction','Satisfaction').replace('Hub & Spoke','Hub & Spoke');
  if (i === 9) return 'Financials';
  return 'Report';
}

// ─── PROGRESS BAR ─────────────────────────────────────────────────────────────

function renderProgress() {
  const wrap = document.getElementById('progressSteps');
  wrap.innerHTML = '';
  for (let i = 0; i < TOTAL_STEPS; i++) {
    const reachable = i <= state.step;
    const div = document.createElement('div');
    div.className = 'step-pill' + (i === state.step ? ' active' : '') + (i < state.step ? ' done' : '') + (!reachable ? ' locked' : '');
    div.title = reachable ? `Go to: ${stepName(i)}` : 'Complete previous steps to unlock';
    div.innerHTML = `<span class="step-num">${i < state.step ? '&#10003;' : i + 1}</span>${stepName(i)}`;
    if (reachable) div.onclick = () => { state.step = i; persistState(); render(); };
    wrap.appendChild(div);
  }
}

// ─── RENDER DISPATCH ──────────────────────────────────────────────────────────

function render() {
  renderProgress();
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  if (state.step === 0) renderWelcome(main);
  else if (state.step >= 1 && state.step <= 8) renderDriver(main, state.step - 1);
  else if (state.step === 9) renderFinancials(main);
  else renderReport(main);
  main.firstElementChild && main.firstElementChild.classList.add('fade-in');
  window.scrollTo(0, 0);
}

    date: document.getElementById('co_date').value.trim(),

    years: document.getElementById('co_years').value

function renderDriver(main, driverIdx) {
  const d = DRIVERS[driverIdx];
  const answers = state.answers[d.id] || {};
  const progress = Object.keys(answers).length;
  main.innerHTML = `
    <div class="card">
      <div class="driver-header">
        <div class="driver-badge">${d.num}</div>
        <div class="driver-title">
          <h2>${d.name}</h2>
          <p>${d.description}</p>
        </div>
      </div>
      ${d.questions.map((q, qi) => `
        <div class="question-block">
          <div class="question-num">Question ${qi+1} of ${d.questions.length}</div>
          <div class="question-text">${q.text}</div>
          <div class="radio-group">
            ${q.options.map(opt => {
              const sel = answers[q.id] === opt.score;
              return `<label class="radio-option${sel?' selected':''}">
                <input type="radio" name="${q.id}" value="${opt.score}" ${sel?'checked':''} onchange="selectAnswer('${d.id}','${q.id}',${opt.score},this)">
                <span class="radio-option-label">${opt.label}</span>
              </label>`;
            }).join('')}
          </div>
        </div>
      `).join('')}
      <p id="driver_err" class="error-msg">Please answer all questions before continuing.</p>
      <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="goBack()">← Back</button>
        <button class="btn btn-primary" onclick="saveDriver(${driverIdx})">
          ${driverIdx < 7 ? 'Next Driver →' : 'Financial Data →'}
        </button>
      </div>
    </div>`;
}

function selectAnswer(driverId, qId, score, el) {
  if (!state.answers[driverId]) state.answers[driverId] = {};
  state.answers[driverId][qId] = score;
  // update visual selection
  document.querySelectorAll(`[name="${qId}"]`).forEach(r => {
    r.closest('.radio-option').classList.remove('selected');
  });
  el.closest('.radio-option').classList.add('selected');
}

function saveDriver(driverIdx) {
  const d = DRIVERS[driverIdx];
  const answers = state.answers[d.id] || {};
  if (d.questions.some(q => answers[q.id] === undefined)) {
    document.getElementById('driver_err').classList.add('show');
    return;
  }
  state.step = driverIdx + 2;
  persistState();
  render();
}

function getNum(id) { return parseFloat(document.getElementById(id)?.value) || 0; }

function calcFinancials() {
  const rev = getNum('f_revenue');
  const cogs = getNum('f_cogs');
  const gp = rev - cogs;
  const staff = getNum('f_staff'), rent = getNum('f_rent'), mkt = getNum('f_marketing'),
        other_oh = getNum('f_other_oh'), da = getNum('f_da');
  const ebitda = gp - staff - rent - mkt - other_oh; // da already excluded from EBITDA
  const ownerSal = getNum('f_owner_salary'), marketSal = getNum('f_market_salary');
  const ownerAb = ownerSal - marketSal;
  const legal = getNum('f_legal'), redundancy = getNum('f_redundancy'),
        oneoffMkt = getNum('f_oneoff_mkt'), otherNr = getNum('f_other_nr');
  const disposal = getNum('f_disposal'), oneoffInc = getNum('f_oneoff_inc');
  const rentCharged = getNum('f_rent_charged'), rentMarket = getNum('f_rent_market');
  const rentAb = rentCharged - rentMarket;
  const adjEbitda = ebitda + ownerAb + legal + redundancy + oneoffMkt + otherNr - disposal - oneoffInc + rentAb;

  const fmt = n => '£' + Math.round(n).toLocaleString('en-GB');
  const setDisp = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = fmt(val); };
  setDisp('disp_gp', gp);
  setDisp('disp_ebitda', ebitda);
  setDisp('disp_owner_ab', ownerAb);
  setDisp('disp_rent_ab', rentAb);
  setDisp('disp_adj_ebitda', adjEbitda);
}

function saveFinancials() {
  if (!state.industry) { document.getElementById('fin_err').classList.add('show'); return; }
  const f = {};
  ['revenue','cogs','staff','rent','marketing','other_oh','da',
   'owner_salary','market_salary','legal','redundancy','oneoff_mkt','other_nr',
   'disposal','oneoff_inc','rent_charged','rent_market','growth_rate'].forEach(k => {
    f[k] = parseFloat(document.getElementById('f_'+k)?.value) || 0;
  });
  state.financials = f;
  computeScores();
  state.step = 10;
  persistState();
  render();
}

// ─── SCORING ENGINE ────────────────────────────────────────────────────────────

function computeScores() {
  DRIVERS.forEach(d => {
    const answers = state.answers[d.id] || {};
    const vals = d.questions.map(q => answers[q.id] !== undefined ? answers[q.id] : 0);
    state.scores[d.id] = Math.round(vals.reduce((a,b)=>a+b,0) / vals.length);
  });
  state.scores.overall = Math.round(DRIVERS.reduce((s,d)=>s+state.scores[d.id],0) / DRIVERS.length);
}

function getMultiple(vbs) {
  // Interpolation: score → multiple range position
  const mul = INDUSTRY_MULTIPLES[state.industry] || { min: 2, max: 5 };
  // Map VBS 0-100 to mul.min-mul.max using slight S-curve via clamped linear
  const t = Math.max(0, Math.min(100, vbs)) / 100;
  return mul.min + (mul.max - mul.min) * t;
}

function getAdjEbitda() {
  const f = state.financials;
  const rev = f.revenue||0, cogs = f.cogs||0;
  const gp = rev - cogs;
  const ebitda = gp - (f.staff||0) - (f.rent||0) - (f.marketing||0) - (f.other_oh||0);
  const ownerAb = (f.owner_salary||0) - (f.market_salary||0);
  const rentAb = (f.rent_charged||0) - (f.rent_market||0);
  return ebitda + ownerAb + (f.legal||0) + (f.redundancy||0) + (f.oneoff_mkt||0) + (f.other_nr||0)
       - (f.disposal||0) - (f.oneoff_inc||0) + rentAb;
}

function getBand(score) {
  return SCORE_BANDS.find(b => score >= b.min && score < b.max) || SCORE_BANDS[SCORE_BANDS.length-1];
}

    div.className = 'driver-score-card';
    const score = state.scores[d.id];
    const avg = INDUSTRY_AVERAGES[d.avgKey];
    const b = getBand(score);
    div.innerHTML = `
      <h3>${d.num}. ${d.name}</h3>
      <div class="driver-gauge-wrap"><canvas id="gauge_${d.id}" width="340" height="130"></canvas></div>
      <div class="driver-score-num">${score} <span class="score-band ${b.cls}" style="font-size:0.7rem;padding:2px 8px">${b.label}</span></div>
      <div class="driver-avg-label">Industry Average: ${avg}</div>`;
    grid.appendChild(div);
  });

  // Build recommendations
  const recs = document.getElementById('recsContainer');
  const sorted = [...DRIVERS].sort((a,b) => state.scores[a.id] - state.scores[b.id]);
  sorted.slice(0, 5).forEach(d => {
    const s = state.scores[d.id];
    const avg = INDUSTRY_AVERAGES[d.avgKey];
    const rec = document.createElement('div');
    rec.className = 'rec-item';
    rec.innerHTML = `<div class="rec-driver">${d.num}. ${d.name} — Score: ${s}/100 (Average: ${avg})</div>
      <div class="rec-text">${getRecommendation(d.id, s)}</div>`;
    recs.appendChild(rec);
  });

  // Draw gauges after DOM is ready
  requestAnimationFrame(() => {
    drawGauge('gaugeOverall', overall, INDUSTRY_AVERAGES.overall, true);
    DRIVERS.forEach(d => drawGauge('gauge_'+d.id, state.scores[d.id], INDUSTRY_AVERAGES[d.avgKey], false));
  });
}

// ─── GAUGE CHART ─────────────────────────────────────────────────────────────

function drawGauge(canvasId, score, avgScore, large) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const cx = w / 2;
  const cy = large ? h - 20 : h - 12;
  const r = large ? Math.min(cx - 20, cy - 10) : Math.min(cx - 16, cy - 8);
  const thickness = large ? 22 : 16;
  const startAngle = Math.PI; // left
  const endAngle = 2 * Math.PI; // right (0 degrees = right, but we use 180-360)

  // Background arc segments: red, amber, green
  const segments = [
    { from: 0,   to: 40,  color: '#f8d7da' },
    { from: 40,  to: 70,  color: '#fff3cd' },
    { from: 70,  to: 100, color: '#d4edda' }
  ];

  // Draw track
  segments.forEach(seg => {
    const sa = Math.PI + (seg.from / 100) * Math.PI;
    const ea = Math.PI + (seg.to   / 100) * Math.PI;
    ctx.beginPath();
    ctx.arc(cx, cy, r, sa, ea);
    ctx.lineWidth = thickness;
    ctx.strokeStyle = seg.color;
    ctx.lineCap = 'butt';
    ctx.stroke();
  });

  // Draw outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 2*Math.PI);
  ctx.lineWidth = 1;
  ctx.strokeStyle = '#dde2ec';
  ctx.stroke();

  // Filled score arc
  const scoreColors = [
    { upto: 40, color: '#c0392b' },
    { upto: 70, color: '#f39c12' },
    { upto: 101, color: '#27ae60' }
  ];
  let filled = scoreColors.find(c => score <= c.upto) || scoreColors[2];
  const scoreAngle = Math.PI + (score / 100) * Math.PI;
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, scoreAngle);
  ctx.lineWidth = thickness;
  ctx.strokeStyle = filled.color;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Industry average tick
  if (avgScore > 0) {
    const avgAngle = Math.PI + (avgScore / 100) * Math.PI;
    const tickOuter = r + thickness / 2 + 4;
    const tickInner = r - thickness / 2 - 4;
    ctx.beginPath();
    ctx.moveTo(cx + tickInner * Math.cos(avgAngle), cy + tickInner * Math.sin(avgAngle));
    ctx.lineTo(cx + tickOuter * Math.cos(avgAngle), cy + tickOuter * Math.sin(avgAngle));
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = '#1a2744';
    ctx.stroke();
    // avg label
    const lblR = r + thickness / 2 + 14;
    ctx.font = `${large?11:9}px Segoe UI`;
    ctx.fillStyle = '#1a2744';
    ctx.textAlign = 'center';
    ctx.fillText('avg', cx + lblR * Math.cos(avgAngle), cy + lblR * Math.sin(avgAngle));
  }

  // Score labels at edges
  ctx.font = `${large ? 11 : 9}px Segoe UI`;
  ctx.fillStyle = '#9ca3af';
  ctx.textAlign = 'center';
  ctx.fillText('0', cx - r - 8, cy + 4);
  ctx.fillText('100', cx + r + 8, cy + 4);
  if (large) {
    ctx.fillText('50', cx, cy - r - 10);
  }

  // Centre score text
  ctx.font = `bold ${large ? 36 : 0}px Segoe UI`;
  if (large) {
    ctx.fillStyle = '#1a2744';
    ctx.textAlign = 'center';
    ctx.fillText(score, cx, cy - 10);
  }
}

// ─── RECOMMENDATIONS ──────────────────────────────────────────────────────────

function getRecommendation(id, score) {
  const recs = {
    financial: [
      [0,  'Your financial performance needs significant attention. Focus on reducing costs, improving margins, and establishing clear monthly management accounts to understand profitability by product/service line.'],
      [40, 'Your financial performance is developing. Work on improving consistency, building a 3-year financial model, and benchmarking margins against sector peers to identify improvement levers.'],
      [70, 'Strong financial performance. Consider documenting your financial story for a potential buyer — clean, audited accounts and a forward-looking financial model will increase buyer confidence.']
    ],
    growth: [
      [0,  'Growth potential is limited. Map your total addressable market, create a written growth strategy with milestones, and identify 2–3 specific growth initiatives with dedicated resource.'],
      [40, 'Moderate growth potential. Formalise your growth strategy, strengthen your sales and marketing infrastructure, and build evidence of your scalability for a buyer audience.'],
      [70, 'Good growth potential. Ensure your growth story is backed by credible data and a documented strategy. Consider how to reduce revenue concentration and open new markets.']
    ],
    switzerland: [
      [0,  'High concentration risk. Actively reduce reliance on your top customer (target <15%), diversify your supplier base, and cross-train staff to remove single-employee dependency.'],
      [40, 'Some concentration risk remains. Set a 12-month target to reduce your largest customer below 20% and document supplier alternatives to demonstrate resilience to buyers.'],
      [70, 'Good diversification. Maintain your diversified structure and document the evidence — buyers will want to see customer revenue split and supplier alternatives.']
    ],
    teeter: [
      [0,  'You are in a weak negotiating position. Eliminate personal urgency to sell before going to market, systematically document all processes, and build a team that runs without you.'],
      [40, 'Your negotiating position is developing. Focus on documenting processes, building management capability, and ensuring cash flow is visibly independent of your involvement.'],
      [70, 'Good balance. Ensure potential buyers can see your documented systems and your management team\'s capability without you needing to be present.']
    ],
    recurring: [
      [0,  'Almost no recurring revenue — high risk for buyers. Convert project-based relationships to retainers or service contracts. Even 20% recurring revenue dramatically improves value.'],
      [40, 'Some recurring revenue. Systematically convert your top clients to annual contracts, introduce auto-renewal clauses, and track churn as a KPI on your management dashboard.'],
      [70, 'Good recurring revenue base. Focus on reducing churn further and extending average contract length to maximise the predictability premium buyers will pay.']
    ],
    monopoly: [
      [0,  'You operate in a commodity market. Identify a niche to own, register any available IP, explore exclusive distribution rights, and invest in building a recognisable brand.'],
      [40, 'Some differentiation but not yet defensible. Formalise and protect your IP, seek exclusive arrangements where possible, and invest in building your brand story.'],
      [70, 'Strong differentiation. Document your IP portfolio, exclusive arrangements, and competitive moat clearly — this is a significant value premium to communicate to buyers.']
    ],
    customer: [
      [0,  'Customer satisfaction is unmeasured and likely at risk. Implement NPS measurement immediately, identify your at-risk accounts, and create a formal customer success process.'],
      [40, 'Customer satisfaction is developing. Formalise your measurement approach, set an NPS target, and build a referral programme to turn satisfied customers into advocates.'],
      [70, 'Strong customer satisfaction. Ensure your NPS data is documented and trending upwards — this evidence of loyalty significantly reduces perceived risk for buyers.']
    ],
    hub: [
      [0,  'The business is entirely dependent on you — a major value killer. Start delegating decisions immediately, hire or develop a second-in-command, and begin documenting all processes.'],
      [40, 'Some owner independence but fragile. Define clear decision rights, invest in your management team, and test absence periods to build buyer confidence in independent operation.'],
      [70, 'Good owner independence. Consider a formal "owner away" test — operate for 2+ months with minimal involvement and document the result to demonstrate independence to buyers.']
    ]
  };
  const arr = recs[id] || [];
  const found = arr.slice().reverse().find(r => score >= r[0]);
  return found ? found[1] : arr[0][1];
}

function getOverallComment(score) {
  if (score < 30) return 'Your business has significant value-building work ahead. The good news: every point gained represents meaningful improvement in enterprise value.';
  if (score < 50) return 'Your business is in the "building value" zone. Focus on the lowest-scoring drivers first — targeted improvements can quickly move you into a higher valuation bracket.';
  if (score < 70) return 'Your business is performing near the industry average. Strategic focus on 2–3 key drivers could move you into the premium value tier.';
  return 'Your business is a strong Value Builder. Maintaining and documenting your strengths will help you command a premium when the time is right.';
}

// ─── NAVIGATION ────────────────────────────────────────────────────────────────

function goBack() {
  if (state.step > 0) { state.step--; persistState(); render(); }
}

function restoreSession() {
  const snap = window._pendingRestore;
  if (!snap) return;
  applySnapshot(snap);
  window._pendingRestore = null;
  updateSaveStatus(snap.savedAt);
  render();
}

// ─── SAVE / LOAD ───────────────────────────────────────────────────────────────

const STORAGE_KEY = 'vba_progress_v1';

function persistState() {
  try {
    const snapshot = {
      step: state.step,
      company: state.company,
      answers: state.answers,
      financials: state.financials,
      industry: state.industry,
      scores: state.scores,
      savedAt: new Date().toISOString()
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
    updateSaveStatus(snapshot.savedAt);
  } catch(e) { /* storage unavailable */ }
}

function updateSaveStatus(isoDate) {
  const el = document.getElementById('saveStatus');
  if (!el) return;
  if (!isoDate) { el.textContent = 'Not saved yet'; return; }
  const d = new Date(isoDate);
  el.textContent = 'Auto-saved ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }) + ' on ' + d.toLocaleDateString('en-GB');
}

function loadPersistedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function applySnapshot(snap) {
  state.step       = snap.step       || 0;
  state.company    = snap.company    || {};
  state.answers    = snap.answers    || {};
  state.financials = snap.financials || {};
  state.industry   = snap.industry   || '';
  state.scores     = snap.scores     || {};
}

function clearSaved() {
  if (!confirm('Clear all saved progress and start fresh?')) return;
  localStorage.removeItem(STORAGE_KEY);
  Object.assign(state, { step:0, company:{}, answers:{}, financials:{}, industry:'', scores:{} });
  updateSaveStatus(null);
  render();
}

function exportToFile() {
  try {
    const snap = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    snap.exportedAt = new Date().toISOString();
    const blob = new Blob([JSON.stringify(snap, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    const company = (state.company.name || 'assessment').replace(/[^a-z0-9]/gi, '_').toLowerCase();
    a.download = `vba_${company}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  } catch(e) { alert('Could not export: ' + e.message); }
}

function importFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const snap = JSON.parse(e.target.result);
      if (!snap.company && !snap.answers) throw new Error('File does not appear to be a valid assessment file.');
      applySnapshot(snap);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(snap));
      updateSaveStatus(snap.savedAt || snap.exportedAt || new Date().toISOString());
      render();
    } catch(err) {
      alert('Could not load file: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // allow re-loading same file
}

// ─── INIT ──────────────────────────────────────────────────────────────────────

const _savedSnap = loadPersistedState();
if (_savedSnap && _savedSnap.step > 0) {
  // Don't auto-apply yet — welcome screen will show a restore banner
  window._pendingRestore = _savedSnap;
  updateSaveStatus(_savedSnap.savedAt);
}
render();
</script>
